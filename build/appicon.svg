      <rect width="1024" height="1024" fill="white"/>
      <rect x="158" y="427" width="708" height="35" fill="black"/>
      <rect x="427" y="427" width="35" height="439" fill="black"/>
      <rect x="427" y="618" width="439" height="35" fill="black"/>
