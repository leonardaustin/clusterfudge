<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Cutout Mask for UI Quadrants -->
  <defs>
    <mask id="cutout">
      <rect width="100" height="100" fill="white"></rect>
      <rect x="0" y="38" width="100" height="5" fill="black"></rect>
      <rect x="38" y="38" width="5" height="62" fill="black"></rect>
      <rect x="38" y="65" width="62" height="5" fill="black"></rect>
    </mask>
  </defs>
  <!-- Base Polygon applied with negative space mask -->
  <polygon points="50,4 86,21.3 94.8,60.3 69.9,91.4 30.1,91.4 5.2,60.3 14,21.3" fill="#326CE5" mask="url(#cutout)"></polygon>
</svg>
