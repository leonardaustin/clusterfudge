name: Bug Report
description: Report a bug in Clusterfudge
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open Clusterfudge
        2. Connect to a cluster
        3. Navigate to ...
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Clusterfudge version
      placeholder: e.g. 2026.0319.1825
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x64)
        - Linux (ARM64)
    validations:
      required: true
  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes version
      placeholder: e.g. 1.29.2
  - type: input
    id: k8s-distro
    attributes:
      label: Kubernetes distribution
      placeholder: e.g. EKS, GKE, AKS, K3s, kind
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant logs or attach screenshots.
      render: shell
