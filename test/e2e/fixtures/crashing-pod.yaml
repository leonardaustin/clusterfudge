apiVersion: v1
kind: Pod
metadata:
  name: e2e-crasher
  namespace: kubeviewer-e2e
  labels:
    app: e2e-crasher
    managed-by: kubeviewer-e2e
spec:
  restartPolicy: OnFailure
  containers:
    - name: crasher
      image: busybox:latest
      command: ["/bin/sh", "-c"]
      args: ["echo 'crashing now'; exit 1"]
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
