apiVersion: v1
kind: LimitRange
metadata:
  name: e2e-limit-range
  namespace: clusterfudge-e2e
  labels:
    managed-by: clusterfudge-e2e
spec:
  limits:
    - type: Container
      default:
        cpu: "200m"
        memory: "128Mi"
      defaultRequest:
        cpu: "100m"
        memory: "64Mi"
      max:
        cpu: "2"
        memory: "2Gi"
      min:
        cpu: "10m"
        memory: "16Mi"
