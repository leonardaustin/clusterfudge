apiVersion: v1
kind: Pod
metadata:
  name: e2e-multi-container
  namespace: kubeviewer-e2e
  labels:
    app: e2e-multi-container
    managed-by: kubeviewer-e2e
spec:
  containers:
    - name: container-a
      image: busybox:latest
      command: ["/bin/sh", "-c"]
      args: ["while true; do echo 'container-a-line'; sleep 1; done"]
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
    - name: container-b
      image: busybox:latest
      command: ["/bin/sh", "-c"]
      args: ["while true; do echo 'container-b-line'; sleep 1; done"]
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
